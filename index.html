<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COMORES QUIZ | WALLET x5</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg:    #ffffff;
            --card:  #f8f9fc;
            --bdr:   #e2e8f0;
            --green: #10b981;
            --g2:    #059669;
            --gold:  #f59e0b;
            --red:   #ef4444;
            --muted: #6b7280;
            --dim:   #9ca3af;
            --text:  #1f2937;
        }
        html, body { 
            width:100%; 
            height:100%; 
            overflow:hidden; 
            background:var(--bg); 
            color:var(--text); 
            font-family:'DM Sans',sans-serif;
            position:fixed;
        }
        #app { 
            position:fixed; 
            inset:0; 
            z-index:1; 
            display:flex; 
            flex-direction:column; 
            padding:8px 12px 8px 12px; 
            gap:6px; 
            background: var(--bg);
            overflow-y: hidden;
            height: 100%;
            max-height: 100vh;
        }
        
        /* ===== COMPACT + NO SCROLL ===== */
        /* reduction intense sur écrans bas / petits mobiles */
        @media (max-height: 720px) {
            #app { padding: 6px 10px 5px 10px; gap: 5px; }
            .logo { font-size: 14px; gap: 6px; }
            .wallet { padding: 3px 10px; gap: 5px; font-size: 11px; }
            .timer-pill { padding: 3px 9px; font-size: 12px; gap: 5px; }
            .stat { padding: 5px 6px; }
            .s-lbl { font-size: 7px; letter-spacing: 0.12em; margin-bottom: 1px; }
            .s-val { font-size: 12px; }
            #mise-zone { padding: 6px 9px; }
            .m-lbl { font-size: 8px; margin-bottom: 3px; }
            .btn-launch { padding: 7px 14px; font-size: 10px; }
            #mise-input { font-size: 13px; padding: 6px 9px; }
            #prog-wrap { height: 3px; }
            #t-track { height: 2.5px; }
            #q-card { padding: 8px 12px; }
            .q-badge { font-size: 8px; padding: 2px 8px; margin-bottom: 4px; }
            #q-text { font-size: 13px; line-height: 1.3; }
            .a-btn { padding: 6px 8px; gap: 6px; border-radius: 11px; }
            .a-ltr { width: 20px; height: 20px; font-size: 10px; }
            .a-txt { font-size: 11px; line-height: 1.25; }
            .m-row { gap: 6px; }
            #stats { gap: 5px; }
            .timer-pill span:last-child { font-size: 12px; }
        }
        
        @media (max-height: 640px) {
            #app { padding: 5px 8px 4px 8px; gap: 4px; }
            .stat { padding: 4px 5px; }
            .s-val { font-size: 11px; }
            .btn-launch { padding: 5px 12px; }
            #mise-input { padding: 5px 8px; font-size: 12px; }
            .a-btn { padding: 5px 7px; }
            .a-txt { font-size: 10px; }
            .q-badge { font-size: 7px; }
            #q-text { font-size: 12px; }
            .wallet span:last-child { font-size: 12px; }
        }

        @media (max-height: 560px) {
            .logo svg { width: 28px; height: 18px; }
            .wallet, .timer-pill { padding: 2px 8px; }
            .s-lbl { font-size: 6px; }
            .s-val { font-size: 10px; }
            .btn-launch { padding: 4px 10px; font-size: 9px; }
            #answers { gap: 5px; }
            .m-lbl { font-size: 7px; }
            #mise-info { font-size: 8px; }
            .a-btn { padding: 4px 6px; }
        }
        
        /* General flex shrink & overflow control */
        #answers {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            overflow-y: visible;
        }
        
        .logo {
            display:flex; align-items:center; gap:8px;
            font-family:'Syne',sans-serif; font-size:16px; font-weight:800; letter-spacing:-.01em; color:var(--green);
        }
        .logo span.sub { color:var(--muted); }
        .wallet {
            background:var(--card); border:1px solid var(--bdr);
            border-radius:100px; padding:4px 12px;
            display:flex; align-items:center; gap:6px;
            font-family:'DM Mono',monospace; font-size:12px; font-weight:500;
        }
        .wallet span:first-child { font-size:10px; color:var(--muted); letter-spacing:.05em; }
        .wallet span:last-child { color:var(--green); font-weight:800; }
        .timer-pill {
            display:flex; align-items:center; gap:6px;
            background:var(--card); border:1px solid var(--bdr);
            border-radius:100px; padding:4px 10px;
            font-family:'DM Mono',monospace; font-size:12px; font-weight:500;
            color:var(--text);
        }
        .t-dot { width:7px; height:7px; border-radius:50%; background:var(--green); transition:background .3s; }
        .t-dot.urgent { background:var(--red); animation:blink .5s ease infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        #t-track { flex-shrink:0; height:3px; background:#eef2f6; border-radius:100px; overflow:hidden; margin-top: 1px; margin-bottom: 1px; }
        #t-fill   { height:100%; border-radius:100px; background:var(--green); transition:width 1s linear, background .5s; }
        #t-fill.urgent { background:var(--red); }

        #stats { flex-shrink:0; display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
        .stat  { background:var(--card); border:1px solid var(--bdr); border-radius:12px; padding:6px 8px; text-align:center; }
        .s-lbl { font-size:8px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
        .s-val { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--text); }
        .s-val.g { color:var(--green); }
        .s-val.o { color:var(--gold); }

        #mise-zone { flex-shrink:0; background:var(--card); border:1px solid var(--bdr); border-radius:14px; padding:8px 12px; }
        .m-lbl { font-size:9px; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
        .m-row { display:flex; gap:8px; align-items:center; }
        #mise-input {
            flex:1; background:#fff; border:1px solid var(--bdr); border-radius:9px;
            color:var(--text); font-family:'DM Mono',monospace; font-size:14px; font-weight:500;
            padding:8px 12px; outline:none; width:100%;
        }
        #mise-input:focus { border-color:var(--green); }
        #mise-input:disabled { opacity:.5; background:#f3f4f6; }
        .btn-launch {
            flex-shrink:0; background:linear-gradient(135deg,var(--green),var(--g2));
            color:#fff; font-family:'Syne',sans-serif; font-size:10px; font-weight:800;
            letter-spacing:.12em; text-transform:uppercase; border:none; border-radius:9px;
            padding:8px 16px; cursor:pointer; transition:all .2s;
        }
        .btn-launch:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 14px rgba(16,214,122,0.25); }
        .btn-launch:disabled { opacity:.5; cursor:not-allowed; }
        #mise-info { font-size:9px; color:var(--muted); margin-top:4px; text-align:center; font-family:'DM Mono',monospace; }

        #prog-wrap { flex-shrink:0; background:#eef2f6; border-radius:100px; height:4px; overflow:hidden; margin: 2px 0; }
        #prog-bar  { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--green),#34d399); transition:width .4s ease; }

        #q-card { flex-shrink:0; background:var(--card); border:1px solid var(--bdr); border-radius:16px; padding:10px 14px; }
        .q-badge {
            display:inline-block; background:rgba(16,214,122,0.1); border:1px solid rgba(16,214,122,0.25);
            border-radius:100px; padding:2px 9px; font-size:8px; font-weight:700;
            letter-spacing:.15em; text-transform:uppercase; color:var(--green); margin-bottom:6px;
        }
        #q-text { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; line-height:1.35; color:var(--text); }
        #q-text.ph { color:var(--dim); font-style:italic; font-family:'DM Sans',sans-serif; font-weight:400; }

        #answers { flex:1; min-height:0; display:grid; grid-template-columns:1fr 1fr; gap:7px; overflow-y: visible; }
        .a-btn {
            background:#fff; border:1px solid var(--bdr); border-radius:13px;
            padding:8px 10px; display:flex; align-items:flex-start; gap:8px;
            cursor:pointer; transition:all .18s; text-align:left;
        }
        .a-btn:hover:not(:disabled):not(.ph-a) { background:#f1f5f9; border-color:var(--green); transform:translateY(-1px); }
        .a-btn:disabled { cursor:not-allowed; opacity:0.7; }
        .a-btn.ph-a { cursor:default; opacity:0.6; }
        .a-ltr {
            flex-shrink:0; width:22px; height:22px; border-radius:6px;
            background:#f3f4f6; border:1px solid var(--bdr);
            display:flex; align-items:center; justify-content:center;
            font-family:'DM Mono',monospace; font-size:11px; font-weight:500; color:var(--muted);
        }
        .a-txt { font-size:12px; font-weight:500; color:var(--text); line-height:1.3; padding-top:2px; }
        .a-btn.correct { border-color:var(--green) !important; background:rgba(16,214,122,0.1) !important; }
        .a-btn.correct .a-ltr { background:var(--green); color:#fff; border-color:var(--green); }
        .a-btn.wrong   { border-color:var(--red) !important; background:rgba(239,68,68,0.08) !important; }
        .a-btn.wrong   .a-ltr { background:var(--red); color:#fff; border-color:var(--red); }
        @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
        .slide { animation:slideIn .22s ease forwards; }

        #result {
            position:fixed; inset:0; z-index:50; background:rgba(255,255,255,0.98);
            display:none; flex-direction:column; align-items:center; justify-content:center;
            padding:20px; text-align:center; gap:12px;
            backdrop-filter: blur(2px);
        }
        #result.show { display:flex; }
        .r-icon  { font-size:48px; line-height:1; }
        .r-title { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; }
        .r-title.win  { color:var(--green); }
        .r-title.lose { color:var(--red); }
        .r-gain   { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; color:var(--gold); }
        .r-reason { font-size:12px; color:var(--muted); max-width:260px; line-height:1.4; }
        .btn-replay {
            margin-top:2px; background:#f3f4f6; border:1px solid var(--bdr);
            color:var(--text); font-family:'Syne',sans-serif; font-size:11px; font-weight:800;
            letter-spacing:.12em; text-transform:uppercase; border-radius:12px;
            padding:11px 28px; cursor:pointer; transition:all .2s;
        }
        .btn-replay:hover { background:#e5e7eb; transform:translateY(-1px); }
        
        /* no scroll on small screens - extra safety */
        @media (max-height: 480px) {
            .a-btn { padding: 4px 6px; gap: 4px; }
            .a-ltr { width: 18px; height: 18px; font-size: 9px; }
            .a-txt { font-size: 9px; }
            .btn-launch { padding: 4px 8px; font-size: 8px; }
            #q-text { font-size: 11px; }
            .r-title { font-size: 22px; }
            .r-gain { font-size: 18px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div class="logo">
            <svg class="flag" width="34" height="22" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" style="border-radius:4px; overflow:hidden; border:1px solid #e2e8f0;">
                <rect width="900" height="150" y="0"   fill="#fecb00"/>
                <rect width="900" height="150" y="150" fill="#fff"/>
                <rect width="900" height="150" y="300" fill="#ce1126"/>
                <rect width="900" height="150" y="450" fill="#3a75c4"/>
                <polygon points="0,0 360,300 0,600" fill="#009a44"/>
                <circle cx="145" cy="300" r="105" fill="#fff"/>
                <circle cx="178" cy="300" r="105" fill="#009a44"/>
                <g fill="#fff">
                    <polygon points="268,130 278,162 312,162 286,181 296,213 268,194 240,213 250,181 224,162 258,162" transform="scale(0.72) translate(-20,50)"/>
                    <polygon points="268,200 278,232 312,232 286,251 296,283 268,264 240,283 250,251 224,232 258,232" transform="scale(0.72) translate(-20,50)"/>
                    <polygon points="268,270 278,302 312,302 286,321 296,353 268,334 240,353 250,321 224,302 258,302" transform="scale(0.72) translate(-20,50)"/>
                    <polygon points="268,340 278,372 312,372 286,391 296,423 268,404 240,423 250,391 224,372 258,372" transform="scale(0.72) translate(-20,50)"/>
                </g>
            </svg>
            COMORES <span class="sub">QUIZ</span>
        </div>
        <div style="display:flex; gap:8px;">
            <div class="wallet">
                <span>💰 WALLET</span>
                <span id="wallet-amount">5000</span><span> KMF</span>
            </div>
            <div class="timer-pill">
                <div class="t-dot" id="t-dot"></div>
                <span id="t-disp">1:20</span>
            </div>
        </div>
    </div>

    <div id="t-track"><div id="t-fill" style="width:100%"></div></div>

    <div id="stats">
        <div class="stat"><div class="s-lbl">Question</div><div class="s-val" id="s-q">—</div></div>
        <div class="stat"><div class="s-lbl">Mise</div><div class="s-val g" id="s-m">—</div></div>
        <div class="stat"><div class="s-lbl">Gain max</div><div class="s-val o" id="s-g">—</div></div>
    </div>

    <div id="mise-zone">
        <div class="m-lbl">Mise (100 – 1 000 KMF)</div>
        <div class="m-row">
            <input type="number" id="mise-input" placeholder="Ex : 500" min="100" max="1000">
            <button class="btn-launch" id="btn-l">Lancer</button>
        </div>
        <div id="mise-info">Entrez votre mise pour commencer</div>
    </div>

    <div id="prog-wrap"><div id="prog-bar" style="width:0%"></div></div>

    <div id="q-card">
        <div class="q-badge" id="q-badge">Question ?</div>
        <div id="q-text" class="ph">En attente de votre mise…</div>
    </div>

    <div id="answers">
        <button class="a-btn ph-a" disabled><div class="a-ltr">A</div><div class="a-txt ph-t">—</div></button>
        <button class="a-btn ph-a" disabled><div class="a-ltr">B</div><div class="a-txt ph-t">—</div></button>
        <button class="a-btn ph-a" disabled><div class="a-ltr">C</div><div class="a-txt ph-t">—</div></button>
        <button class="a-btn ph-a" disabled><div class="a-ltr">D</div><div class="a-txt ph-t">—</div></button>
    </div>
</div>

<div id="result">
    <div class="r-icon" id="r-icon">🏆</div>
    <div class="r-title" id="r-title">VICTOIRE !</div>
    <div class="r-gain"   id="r-gain"></div>
    <div class="r-reason" id="r-reason"></div>
    <button class="btn-replay" id="btn-replay">Nouvelle partie</button>
</div>

<script>
    // ----- État global -----
    const TOTAL = 8;
    const TIME  = 80;
    const LTR   = ['A','B','C','D'];

    let allQuestions = [];
    let selectedQuestions = [];
    let currentIndex = 0;
    let currentMise = 0;
    let timeLeft = TIME;
    let timerInterval = null;
    let gameActive = false;
    let wallet = 5000;

    const walletSpan = document.getElementById('wallet-amount');
    const questionText = document.getElementById('q-text');
    const questionBadge = document.getElementById('q-badge');
    const answersDiv = document.getElementById('answers');
    const miseInput = document.getElementById('mise-input');
    const btnLaunch = document.getElementById('btn-l');
    const miseInfo = document.getElementById('mise-info');
    const sQ = document.getElementById('s-q');
    const sM = document.getElementById('s-m');
    const sG = document.getElementById('s-g');
    const progBar = document.getElementById('prog-bar');
    const tFill = document.getElementById('t-fill');
    const tDisp = document.getElementById('t-disp');
    const tDot = document.getElementById('t-dot');
    const resultDiv = document.getElementById('result');
    const rIcon = document.getElementById('r-icon');
    const rTitle = document.getElementById('r-title');
    const rGain = document.getElementById('r-gain');
    const rReason = document.getElementById('r-reason');

    function updateWalletUI() {
        walletSpan.textContent = wallet;
    }

    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!Array.isArray(data) || data.length === 0) throw new Error('Fichier JSON invalide ou vide');
            allQuestions = data;
            miseInfo.textContent = `✅ ${allQuestions.length} questions chargées. Entrez votre mise.`;
            miseInfo.style.color = '#10b981';
            btnLaunch.disabled = false;
        } catch (err) {
            console.error(err);
            miseInfo.textContent = '❌ ERREUR : questions.json introuvable. Vérifiez le fichier.';
            miseInfo.style.color = '#ef4444';
            btnLaunch.disabled = true;
            questionText.textContent = 'Fichier de questions manquant.';
            questionText.classList.add('ph');
        }
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function startGame() {
        if (!allQuestions.length) {
            miseInfo.textContent = '❌ Chargement en cours ou échoué. Patientez.';
            return;
        }
        const miseValue = parseInt(miseInput.value);
        if (isNaN(miseValue) || miseValue < 100 || miseValue > 1000) {
            miseInfo.textContent = '⚠ Mise entre 100 et 1 000 KMF';
            miseInfo.style.color = '#ef4444';
            return;
        }
        if (miseValue > wallet) {
            miseInfo.textContent = `⚠ Solde insuffisant (${wallet} KMF)`;
            miseInfo.style.color = '#ef4444';
            return;
        }

        wallet -= miseValue;
        updateWalletUI();
        currentMise = miseValue;
        gameActive = true;

        miseInput.disabled = true;
        btnLaunch.disabled = true;
        miseInfo.textContent = `Mise : ${currentMise} KMF → gain max ${currentMise * 5} KMF`;
        miseInfo.style.color = '#6b7280';
        sM.textContent = currentMise + ' KMF';
        sG.textContent = (currentMise * 5) + ' KMF';

        const shuffledAll = shuffleArray([...allQuestions]);
        selectedQuestions = shuffledAll.slice(0, TOTAL);
        currentIndex = 0;
        timeLeft = TIME;
        tFill.style.width = '100%';
        tFill.classList.remove('urgent');
        tDot.classList.remove('urgent');
        tDisp.textContent = '1:20';
        renderCurrentQuestion();
        startTimer();
    }

    function renderCurrentQuestion() {
        const q = selectedQuestions[currentIndex];
        const percent = Math.round((currentIndex / TOTAL) * 100);
        progBar.style.width = percent + '%';
        sQ.textContent = (currentIndex + 1) + '/' + TOTAL;
        questionBadge.textContent = 'Question ' + (currentIndex + 1) + ' / ' + TOTAL;
        questionText.textContent = q.question;
        questionText.classList.remove('ph');

        const mixedOptions = shuffleArray([...q.options]);
        answersDiv.innerHTML = mixedOptions.map((opt, i) => `
            <button class="a-btn slide" data-answer="${escapeHtml(opt)}" style="animation-delay:${i*0.04}s">
                <div class="a-ltr">${LTR[i]}</div>
                <div class="a-txt">${escapeHtml(opt)}</div>
            </button>
        `).join('');

        document.querySelectorAll('#answers .a-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (!gameActive) return;
                const selected = btn.getAttribute('data-answer');
                const correct = selectedQuestions[currentIndex].reponse_correcte;
                handleAnswer(btn, selected, correct);
            });
        });
    }

    function handleAnswer(btn, selected, correct) {
        if (!gameActive) return;
        document.querySelectorAll('#answers .a-btn').forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add('correct');
            btn.querySelector('.a-ltr').textContent = '✓';
            setTimeout(() => {
                if (!gameActive) return;
                if (currentIndex + 1 < TOTAL) {
                    currentIndex++;
                    renderCurrentQuestion();
                } else {
                    winGame();
                }
            }, 380);
        } else {
            btn.classList.add('wrong');
            document.querySelectorAll('#answers .a-btn').forEach(b => {
                if (b.getAttribute('data-answer') === correct) {
                    b.classList.add('correct');
                }
            });
            setTimeout(() => loseGame('Mauvaise réponse ! Vous perdez votre mise.'), 650);
        }
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            if (timeLeft <= 0) {
                loseGame('Temps écoulé !');
                return;
            }
            timeLeft--;
            const percent = (timeLeft / TIME) * 100;
            tFill.style.width = percent + '%';
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            tDisp.textContent = m + ':' + (s < 10 ? '0' : '') + s;
            if (timeLeft <= 15) {
                tDot.classList.add('urgent');
                tFill.classList.add('urgent');
            }
            if (timeLeft <= 0) {
                loseGame('Temps écoulé !');
            }
        }, 1000);
    }

    function winGame() {
        if (!gameActive) return;
        clearInterval(timerInterval);
        gameActive = false;
        const gain = currentMise * 5;
        wallet += gain;
        updateWalletUI();
        progBar.style.width = '100%';
        resultDiv.classList.add('show');
        rIcon.textContent = '🏆';
        rTitle.textContent = 'VICTOIRE !';
        rTitle.className = 'r-title win';
        rGain.textContent = '+ ' + gain + ' KMF';
        rReason.textContent = 'Bravo ! 8/8 correctes. Gains ajoutés au wallet.';
    }

    function loseGame(reason) {
        if (!gameActive) return;
        clearInterval(timerInterval);
        gameActive = false;
        resultDiv.classList.add('show');
        rIcon.textContent = '💀';
        rTitle.textContent = 'GAME OVER';
        rTitle.className = 'r-title lose';
        rGain.textContent = '− ' + currentMise + ' KMF';
        rReason.textContent = reason;
    }

    function resetGame() {
        if (timerInterval) clearInterval(timerInterval);
        gameActive = false;
        resultDiv.classList.remove('show');
        miseInput.disabled = false;
        btnLaunch.disabled = false;
        miseInput.value = '';
        currentMise = 0;
        currentIndex = 0;
        timeLeft = TIME;
        sQ.textContent = '—';
        sM.textContent = '—';
        sG.textContent = '—';
        tDisp.textContent = '1:20';
        tFill.style.width = '100%';
        tFill.classList.remove('urgent');
        tDot.classList.remove('urgent');
        progBar.style.width = '0%';
        miseInfo.textContent = 'Entrez votre mise pour commencer';
        miseInfo.style.color = '';
        questionBadge.textContent = 'Question ?';
        questionText.textContent = 'En attente de votre mise…';
        questionText.classList.add('ph');
        answersDiv.innerHTML = ['A','B','C','D'].map(l => `
            <button class="a-btn ph-a" disabled><div class="a-ltr">${l}</div><div class="a-txt ph-t">—</div></button>
        `).join('');
    }

    btnLaunch.addEventListener('click', startGame);
    document.getElementById('btn-replay').addEventListener('click', resetGame);
    loadQuestions();

    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
            e.preventDefault();
        }
    });
</script>
</body>
</html>
