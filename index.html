<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quizio Comores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        
        /* Sur mobile, on bloque le scroll pour l'effet "App" */
        @media (max-width: 768px) {
            body { height: 100dvh; overflow: hidden; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-[100dvh]" x-data="{ selected: 1, mise: 100, solde: 5000 }">

    <div class="w-full h-[100dvh] md:h-auto md:max-w-xl flex flex-col p-5 md:p-8 bg-white md:shadow-2xl md:rounded-[40px] md:border md:border-gray-100">
        
        <header class="flex justify-between items-center mb-6 shrink-0">
            <div class="flex items-center gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                <img src="https://flagcdn.com/w80/km.png" class="w-10 h-7 rounded shadow-sm" alt="Drapeau Comores">
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-400 font-bold uppercase">Solde</span>
                    <span class="text-sm font-black text-gray-800" x-text="solde + ' f'"></span>
                </div>
            </div>

            <div class="bg-gradient-to-r from-[#3A7D44] to-[#0033A0] px-4 py-2 rounded-2xl text-white shadow-lg shadow-green-100">
                <p class="text-[9px] uppercase font-bold opacity-80">Gain Potentiel</p>
                <p class="text-sm font-black" x-text="+(mise * 1.8).toFixed(0) + ' f'"></p>
            </div>
        </header>

        <div class="grid grid-cols-4 gap-2 mb-6 shrink-0">
            <template x-for="val in [100, 200, 500, 1000]">
                <button @click="mise = val" 
                        :class="mise === val ? 'bg-[#3A7D44] text-white border-[#3A7D44] shadow-md' : 'bg-gray-50 text-gray-400 border-gray-100 hover:bg-gray-100'"
                        class="py-2.5 rounded-xl border font-bold text-xs transition-all active:scale-95">
                    <span x-text="val + 'f'"></span>
                </button>
            </template>
        </div>

        <main class="relative bg-gray-50 rounded-[35px] pt-12 pb-8 px-6 text-center border border-gray-100 mb-6 shrink-0 md:shrink">
            <div class="absolute -top-8 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-md border-4 border-white">
                <svg class="absolute w-full h-full -rotate-90" viewBox="0 0 36 36">
                    <circle class="stroke-gray-200" stroke-width="3" fill="none" cx="18" cy="18" r="16" />
                    <circle class="stroke-[#FFD700]" stroke-width="3" stroke-dasharray="75, 100" stroke-linecap="round" fill="none" cx="18" cy="18" r="16" />
                </svg>
                <span class="text-lg font-black text-gray-800">20</span>
            </div>

            <p class="text-[10px] text-[#3A7D44] font-black uppercase tracking-[0.2em] mb-4">Question 07 / 40</p>
            
            <h3 class="text-2xl font-extrabold text-gray-900 leading-tight">
                Quelle est la capitale de la Grande Comore ?
            </h3>
        </main>

        <div class="flex-1 overflow-y-auto space-y-3 no-scrollbar pr-1">
            <template x-for="(text, index) in ['Moroni', 'Mutsamudu', 'Fomboni', 'Mamoudzou']">
                <button @click="selected = index + 1" 
                        :class="selected === index + 1 ? 'border-[#3A7D44] bg-white ring-4 ring-green-50' : 'border-gray-100 bg-white'"
                        class="w-full p-4 rounded-[22px] flex justify-between items-center border-2 transition-all duration-200 group shadow-sm">
                    <span class="font-bold text-gray-700 text-sm md:text-base" x-text="text"></span>
                    
                    <div :class="selected === index + 1 ? 'bg-[#3A7D44] border-[#3A7D44]' : 'bg-gray-100 border-gray-200'" 
                         class="w-6 h-6 border-2 rounded-full flex items-center justify-center transition-all">
                        <div x-show="selected === index + 1" class="w-2.5 h-2.5 bg-white rounded-full"></div>
                    </div>
                </button>
            </template>
        </div>

        <button class="w-full bg-[#3A7D44] hover:bg-[#2d6135] py-5 rounded-[22px] text-white font-black text-lg shadow-xl shadow-green-100 active:scale-[0.98] transition-all mt-6 shrink-0">
            VALIDER MA MISE
        </button>
    </div>

</body>
</html>
