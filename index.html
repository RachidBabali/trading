<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Double Duel · Demo Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #06010f;
            --purple: #a855f7;
            --fuchsia:#d946ef;
            --gold:   #fbbf24;
            --border: rgba(255,255,255,0.07);
            --surface:rgba(255,255,255,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; width: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: #fff;
        }
        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% -5%,  rgba(168,85,247,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 10% 100%, rgba(217,70,239,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 40% 35% at 90% 90%,  rgba(251,191,36,0.05) 0%, transparent 60%);
        }
        body::after {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 55px 55px;
        }

        #app {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            height: 100dvh;
            width: 100%;
        }

        nav {
            flex-shrink: 0;
            background: rgba(6,1,15,0.9);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
            padding: 8px 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-back {
            display: flex; align-items: center; gap: 5px;
            color: #555; text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase;
            transition: color 0.2s;
        }
        .nav-back:hover { color: #fff; }
        .nav-title {
            font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.05em;
            background: linear-gradient(90deg,#a855f7,#d946ef);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .balance-badge {
            background: linear-gradient(135deg,rgba(168,85,247,0.12),rgba(168,85,247,0.04));
            border: 1px solid rgba(168,85,247,0.25);
            border-radius: 10px; padding: 4px 10px;
            display: flex; align-items: center; gap: 6px;
        }

        #status-msg {
            flex-shrink: 0;
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 6px 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
            text-align: center; color: rgba(255,255,255,0.3);
            transition: color 0.3s, background 0.3s;
        }
        #status-msg.s-win  { color: var(--gold);  background: rgba(251,191,36,0.08); }
        #status-msg.s-lose { color: #ef4444;      background: rgba(239,68,68,0.08); }

        #body {
            flex: 1; min-height: 0;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 10px;
            padding: 10px 14px;
        }

        @media (max-width: 640px) {
            #body {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                gap: 8px;
                padding: 8px 10px;
            }
            #panel-mise {
                flex-direction: row !important;
                flex-wrap: wrap;
                gap: 6px !important;
                padding: 8px 10px !important;
                border-radius: 14px !important;
                align-items: center;
            }
            #panel-mise > .mise-block { flex: 1; min-width: 120px; }
            #panel-mise > .quick-grid { flex: 1; min-width: 160px; }
            #panel-mise > .gain-box   { flex: 1; min-width: 110px; }
            #panel-mise > .mise-hint  { display: none; }
            #panel-mise > .rules-row  { display: none; }
        }

        #panel-mise {
            background: linear-gradient(160deg,rgba(255,255,255,0.04),rgba(0,0,0,0.45));
            border: 1px solid var(--border); border-radius: 18px;
            padding: 10px 12px;
            display: flex; flex-direction: column; gap: 7px;
            overflow: hidden;
        }
        .panel-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 8px; font-weight: 900; letter-spacing: 0.2em;
            text-transform: uppercase; color: var(--purple); opacity: 0.8;
        }
        .mise-input {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            border-radius: 10px; color: white;
            font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700;
            text-align: center; outline: none; width: 100%; padding: 8px;
            transition: border-color 0.3s;
        }
        .mise-input:focus { border-color: rgba(168,85,247,0.5); }
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .quick-btn {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 7px; color: rgba(255,255,255,0.45);
            font-size: 9px; font-weight: 700; padding: 6px 4px;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Orbitron', sans-serif;
        }
        .quick-btn:hover { background: rgba(168,85,247,0.1); border-color: rgba(168,85,247,0.4); color: var(--purple); }
        .span2 { grid-column: span 2; }
        .gain-box {
            background: rgba(168,85,247,0.06); border: 1px solid rgba(168,85,247,0.2);
            border-radius: 10px; text-align: center; padding: 7px;
        }
        .rules-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-top: auto; }
        .rule-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 9px; padding: 5px 3px; text-align: center;
        }

        #zone-cartes {
            display: flex; flex-direction: column; gap: 7px; min-height: 0;
        }
        #history-row { flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
        .history-dot {
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 7px; font-weight: 900; font-family:'Orbitron',sans-serif;
        }
        .h-win  { background:rgba(251,191,36,0.12); color:var(--gold);  border:1px solid rgba(251,191,36,0.3); }
        .h-lose { background:rgba(239,68,68,0.12);  color:#ef4444;      border:1px solid rgba(239,68,68,0.3); }

        #cartes-grid {
            flex: 1; min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .carte-col { display: flex; flex-direction: column; gap: 8px; min-height: 0; }

        .card-wrapper {
            flex: 1; min-height: 0;
            perspective: 1200px; position: relative;
        }
        .card-inner {
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.75s cubic-bezier(0.34,1.56,0.64,1);
        }
        .card-inner.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden; border-radius: 22px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 8px;
        }
        .card-front {
            background: linear-gradient(160deg,rgba(40,20,60,0.9),rgba(10,5,20,0.95));
            border: 2px solid rgba(168,85,247,0.15);
            animation: pulse-border 1.8s ease infinite;
        }
        @keyframes pulse-border {
            0%,100% { border-color:rgba(168,85,247,0.15); }
            50%     { border-color:rgba(168,85,247,0.5); }
        }
        .card-back-a {
            transform: rotateY(180deg);
            background: linear-gradient(145deg,#581c87,#3b0764,#1e1b4b);
            border: 3px solid rgba(168,85,247,0.6);
        }
        .card-back-b {
            transform: rotateY(180deg);
            background: linear-gradient(145deg,#831843,#500724,#1e1b4b);
            border: 3px solid rgba(217,70,239,0.6);
        }
        .card-particles {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.05) 0%,transparent 70%);
            border-radius: inherit;
        }

        .card-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(52px, 12vw, 100px);
            line-height: 1;
            text-shadow: 0 0 30px rgba(255,255,255,0.4);
            position: relative; z-index: 1;
        }
        .card-suit {
            font-size: clamp(18px, 4vw, 28px);
            opacity: 0.65;
            position: relative; z-index: 1;
        }
        .card-lbl {
            font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700;
            letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.2);
            position: relative; z-index: 1;
        }
        .card-icon-wrap {
            width: 46px; height: 46px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 1;
        }

        .win-card .card-front,
        .win-card .card-back-a,
        .win-card .card-back-b {
            box-shadow: 0 0 50px rgba(251,191,36,0.5), 0 0 100px rgba(251,191,36,0.18) !important;
            border-color: var(--gold) !important;
            animation: none !important;
        }

        .btn-choose {
            flex-shrink: 0;
            padding: 12px 8px; border-radius: 14px;
            font-family:'Orbitron',sans-serif; font-size:10px; font-weight:900;
            letter-spacing:0.12em; text-transform:uppercase;
            border:none; cursor:pointer; transition:all 0.3s;
        }
        .btn-a { background:linear-gradient(135deg,#7c3aed,#4c1d95); color:#fff; box-shadow:0 6px 20px rgba(124,58,237,0.35); }
        .btn-a:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 28px rgba(124,58,237,0.5); }
        .btn-b { background:linear-gradient(135deg,#c026d3,#86198f); color:#fff; box-shadow:0 6px 20px rgba(192,38,211,0.35); }
        .btn-b:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 28px rgba(192,38,211,0.5); }
        .btn-choose:disabled { opacity:0.35; cursor:not-allowed; transform:none !important; }

        @keyframes confettiFall {
            0%   { transform:translateY(-10px) rotate(0deg); opacity:1; }
            100% { transform:translateY(90px) rotate(540deg); opacity:0; }
        }
        .confetti-p {
            position:fixed; width:7px; height:7px; border-radius:2px;
            animation:confettiFall 0.9s ease forwards; pointer-events:none; z-index:999;
        }
    </style>
</head>
<body>
<div id="app">

    <nav>
        <a href="#" class="nav-back">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            Retour
        </a>
        <span class="nav-title">DOUBLE DUEL</span>
        <div class="balance-badge">
            <span style="color:var(--purple);font-size:14px">&#128156;</span>
            <div>
                <p style="font-family:'Orbitron',sans-serif;font-size:6px;font-weight:700;letter-spacing:0.2em;color:var(--purple);opacity:0.7;text-transform:uppercase">Solde</p>
                <p id="balance-display" style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:12px;line-height:1.1">
                    15.000 <span style="color:var(--purple);font-size:7px">KMF</span>
                </p>
            </div>
        </div>
    </nav>

    <div id="status-msg">Choisissez votre mise puis selectionnez une carte</div>

    <div id="body">
        <div id="panel-mise">
            <div class="mise-block">
                <p class="panel-label" style="margin-bottom:4px">Mise (KMF)</p>
                <input type="number" id="mise-input" class="mise-input" value="1000" min="100" max="100000">
            </div>

            <div class="quick-grid">
                <button class="quick-btn" onclick="setMise(500)">500</button>
                <button class="quick-btn" onclick="setMise(1000)">1 000</button>
                <button class="quick-btn" onclick="setMise(2000)">2 000</button>
                <button class="quick-btn" onclick="setMise(5000)">5 000</button>
                <button class="quick-btn span2" onclick="setMise(Math.min(100000,Math.floor(getMise()*2)))">x2 la mise</button>
                <button class="quick-btn span2" onclick="setMise(Math.max(100,Math.floor(getMise()/2)))">÷2 la mise</button>
            </div>

            <div class="gain-box">
                <p class="panel-label" style="margin-bottom:3px">Gain potentiel</p>
                <p id="gain-display" style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:17px;color:#fff">
                    2 000 <span style="color:var(--purple);font-size:9px">KMF</span>
                </p>
            </div>

            <div class="mise-hint" style="font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:0.1em;text-align:center;color:#555;line-height:1.9;text-transform:uppercase">
                Carte la + haute gagne<br>
                <span style="color:var(--purple)">Egalite = Victoire</span>
            </div>

            <div class="rules-row">
                <div class="rule-item">
                    <div style="font-size:13px">&#127183;</div>
                    <div style="font-family:'Orbitron',sans-serif;font-size:6px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">Valeurs</div>
                    <div style="font-size:8px;color:rgba(255,255,255,0.22);margin-top:1px">As = 14</div>
                </div>
                <div class="rule-item">
                    <div style="font-size:13px">&#9878;&#65039;</div>
                    <div style="font-family:'Orbitron',sans-serif;font-size:6px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">Egalite</div>
                    <div style="font-size:8px;color:rgba(255,255,255,0.22);margin-top:1px">= Victoire</div>
                </div>
                <div class="rule-item">
                    <div style="font-size:13px">&#128176;</div>
                    <div style="font-family:'Orbitron',sans-serif;font-size:6px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">Gain</div>
                    <div style="font-size:8px;color:rgba(255,255,255,0.22);margin-top:1px">mise x2</div>
                </div>
            </div>
        </div>

        <div id="zone-cartes">
            <div id="history-row">
                <span style="font-family:'Orbitron',sans-serif;font-size:7px;color:#444;letter-spacing:0.2em;text-transform:uppercase">Parties</span>
                <div id="history-dots" style="display:flex;gap:4px"></div>
            </div>

            <div id="cartes-grid">
                <div class="carte-col">
                    <div class="card-wrapper" id="card-a-wrapper">
                        <div class="card-inner" id="card-a-inner">
                            <div class="card-face card-front">
                                <div class="card-particles"></div>
                                <div class="card-icon-wrap" style="background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3)">
                                    <svg width="24" height="24" fill="none" stroke="#a855f7" viewBox="0 0 24 24"><path stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                </div>
                                <span class="card-lbl">Carte A</span>
                            </div>
                            <div class="card-face card-back-a">
                                <div class="card-particles"></div>
                                <div class="card-number" id="val-a">-</div>
                                <div class="card-suit" id="suit-a">&#9824;</div>
                            </div>
                        </div>
                    </div>
                    <button class="btn-choose btn-a" id="btn-a" onclick="playDuel(1)">&#9889; Choisir A</button>
                </div>

                <div class="carte-col">
                    <div class="card-wrapper" id="card-b-wrapper">
                        <div class="card-inner" id="card-b-inner">
                            <div class="card-face card-front">
                                <div class="card-particles"></div>
                                <div class="card-icon-wrap" style="background:rgba(217,70,239,0.15);border:1px solid rgba(217,70,239,0.3)">
                                    <svg width="24" height="24" fill="none" stroke="#d946ef" viewBox="0 0 24 24"><path stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                </div>
                                <span class="card-lbl">Carte B</span>
                            </div>
                            <div class="card-face card-back-b">
                                <div class="card-particles"></div>
                                <div class="card-number" id="val-b">-</div>
                                <div class="card-suit" id="suit-b">&#9829;</div>
                            </div>
                        </div>
                    </div>
                    <button class="btn-choose btn-b" id="btn-b" onclick="playDuel(2)">&#9889; Choisir B</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUITS  = ['\u2660','\u2665','\u2666','\u2663'];
    const LABELS = {1:'A',11:'J',12:'Q',13:'K',14:'AS'};
    let playing = false, history = [], currentBalance = 15000;

    const miseInput   = document.getElementById('mise-input');
    const gainDisplay = document.getElementById('gain-display');
    const statusEl    = document.getElementById('status-msg');
    const btnA        = document.getElementById('btn-a');
    const btnB        = document.getElementById('btn-b');
    const balanceDisplay = document.getElementById('balance-display');

    function getMise() { return parseInt(miseInput.value) || 0; }
    function setMise(v) { miseInput.value = v; updateGain(); }
    function updateGain() {
        const v = getMise();
        gainDisplay.innerHTML = (v*2).toLocaleString('fr') + ' <span style="color:var(--purple);font-size:9px">KMF</span>';
    }
    miseInput.addEventListener('input', updateGain);
    updateGain();

    function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = type === 'win' ? 's-win' : type === 'lose' ? 's-lose' : '';
    }
    function setButtons(disabled) { btnA.disabled = btnB.disabled = disabled; }
    function labelVal(v) { return LABELS[v] || String(v); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function playDuel(choice) {
        if (playing) return;
        const mise = getMise();
        if (isNaN(mise)||mise<100||mise>100000) { setStatus('Mise entre 100 et 100 000 KMF','lose'); return; }
        if (mise > currentBalance) { setStatus('Solde insuffisant !','lose'); return; }

        playing = true; setButtons(true);
        setStatus('Calcul du résultat...');

        // Simulation du backend
        await sleep(600);
        const val1 = Math.floor(Math.random() * 14) + 1;
        const val2 = Math.floor(Math.random() * 14) + 1;
        const win  = (choice === 1 && val1 >= val2) || (choice === 2 && val2 >= val1);
        
        if(win) currentBalance += mise;
        else currentBalance -= mise;

        document.getElementById('val-a').textContent  = labelVal(val1);
        document.getElementById('val-b').textContent  = labelVal(val2);
        document.getElementById('suit-a').textContent = SUITS[Math.floor(Math.random()*4)];
        document.getElementById('suit-b').textContent = SUITS[Math.floor(Math.random()*4)];

        setStatus('Retournement des cartes...');
        document.getElementById('card-a-inner').classList.add('flipped');
        await sleep(300);
        document.getElementById('card-b-inner').classList.add('flipped');
        await sleep(600);

        const winCardId = win 
            ? (choice===1 ? 'card-a-wrapper' : 'card-b-wrapper')
            : (choice===1 ? 'card-b-wrapper' : 'card-a-wrapper');
        document.getElementById(winCardId).classList.add('win-card');

        if (win) { 
            setStatus('VICTOIRE ! +' + (mise*2).toLocaleString() + ' KMF', 'win'); 
            spawnConfetti(); 
        } else { 
            setStatus('DEFAITE ! Vous avez perdu votre mise.', 'lose'); 
        }

        balanceDisplay.innerHTML = currentBalance.toLocaleString('fr') + ' <span style="color:var(--purple);font-size:7px">KMF</span>';
        addHistory(win ? 'win' : 'lose');

        await sleep(3200);
        document.getElementById('card-a-inner').classList.remove('flipped');
        document.getElementById('card-b-inner').classList.remove('flipped');
        document.getElementById('card-a-wrapper').classList.remove('win-card');
        document.getElementById('card-b-wrapper').classList.remove('win-card');
        setStatus('Choisissez votre mise puis selectionnez une carte');
        playing = false; setButtons(false);
    }

    function addHistory(type) {
        history.unshift(type);
        if (history.length > 10) history.pop();
        document.getElementById('history-dots').innerHTML = history.map(h =>
            '<div class="history-dot '+(h==='win'?'h-win':'h-lose')+'">'+(h==='win'?'W':'L')+'</div>'
        ).join('');
    }

    function spawnConfetti() {
        const colors = ['#a855f7','#d946ef','#fbbf24','#ec4899','#fff'];
        for (let i=0; i<22; i++) {
            const el = document.createElement('div');
            el.className = 'confetti-p';
            el.style.left = (15+Math.random()*70)+'%';
            el.style.top  = (10+Math.random()*20)+'%';
            el.style.background = colors[Math.floor(Math.random()*colors.length)];
            el.style.animationDelay    = (Math.random()*0.4)+'s';
            el.style.animationDuration = (0.7+Math.random()*0.6)+'s';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1300);
        }
    }
</script>
</body>
</html>
