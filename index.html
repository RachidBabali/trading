<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Duel · Mon Revenu</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #06010f;
            --purple: #a855f7;
            --fuchsia:#d946ef;
            --gold:   #fbbf24;
            --border: rgba(255,255,255,0.06);
            --surface:rgba(255,255,255,0.03);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden; /* PAS DE SCROLL */
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: #fff;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% -5%,  rgba(168,85,247,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 10% 100%, rgba(217,70,239,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 40% 35% at 90% 90%,  rgba(251,191,36,0.05) 0%, transparent 60%);
        }
        body::after {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 55px 55px;
        }

        .font-gaming  { font-family: 'Orbitron', sans-serif; }
        .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }

        .app {
            position: relative; z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 12px;
        }

        nav {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .nav-back {
            display: flex; align-items: center; gap: 6px;
            color: #555; text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em;
            transition: color 0.2s;
        }
        .nav-back:hover { color: #fff; }
        .nav-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            background: linear-gradient(90deg,#a855f7,#d946ef);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .balance-badge {
            background: linear-gradient(135deg, rgba(168,85,247,0.12), rgba(168,85,247,0.04));
            border: 1px solid rgba(168,85,247,0.25);
            border-radius: 12px;
            padding: 5px 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .balance-badge p.lbl { font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: var(--purple); opacity: 0.7; }
        .balance-badge p.val { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 13px; line-height: 1; }

        .top-strip {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }
        .history-dots { display: flex; gap: 4px; }
        .history-dot {
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 7px; font-weight: 900; font-family: 'Orbitron', sans-serif;
        }
        .h-win  { background: rgba(251,191,36,0.12); color: var(--gold); border: 1px solid rgba(251,191,36,0.3); }
        .h-lose { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        .status-box {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 7px 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
            text-align: center;
            color: rgba(255,255,255,0.3);
        }
        .status-box.win  { border-color: rgba(251,191,36,0.4); color: var(--gold); background: rgba(251,191,36,0.05); }
        .status-box.lose { border-color: rgba(239,68,68,0.4); color: #ef4444; background: rgba(239,68,68,0.05); }

        .main-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 10px;
            min-height: 0;
            padding: 6px 0;
        }

        .side-panel {
            background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0.5) 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
        }
        .lbl-small { font-family: 'Orbitron', sans-serif; font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: var(--purple); margin-bottom: 3px; }
        .mise-input {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px; font-weight: 700; text-align: center;
            outline: none;
            width: 100%; padding: 8px;
            transition: border-color 0.3s;
        }
        .mise-input:focus { border-color: rgba(168,85,247,0.5); }

        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .quick-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: rgba(255,255,255,0.45);
            font-size: 9px; font-weight: 700;
            padding: 6px 4px; cursor: pointer;
            transition: all 0.2s;
            font-family: 'Orbitron', sans-serif;
        }
        .quick-btn:hover { background: rgba(168,85,247,0.1); border-color: rgba(168,85,247,0.4); color: var(--purple); }
        .quick-btn.full { grid-column: span 2; }

        .gain-box {
            background: rgba(168,85,247,0.06);
            border: 1px solid rgba(168,85,247,0.2);
            border-radius: 12px;
            padding: 8px; text-align: center;
        }
        #gain-display { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 18px; }

        .rules-mini {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;
        }
        .rule-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px 3px; text-align: center;
        }
        .rule-item .emoji { font-size: 14px; }
        .rule-item .rtitle { font-family: 'Orbitron', sans-serif; font-size: 6px; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; }
        .rule-item .rdesc { font-size: 8px; color: #555; margin-top: 2px; }

        .hint {
            font-family: 'Orbitron', sans-serif;
            font-size: 7px; text-align: center; color: #333;
            text-transform: uppercase; letter-spacing: 0.15em;
            line-height: 1.6;
        }
        .hint span { color: var(--purple); }

        .cards-zone {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }
        .cards-row {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            min-height: 0;
        }
        .card-col { display: flex; flex-direction: column; gap: 6px; min-height: 0; }

        .card-wrapper { flex: 1; perspective: 1200px; min-height: 0; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .card-inner.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
        }
        .card-front {
            background: linear-gradient(160deg, rgba(40,20,60,0.9) 0%, rgba(10,5,20,0.95) 100%);
            border: 2px solid rgba(168,85,247,0.15);
        }
        .card-back-a {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #581c87, #3b0764, #1e1b4b);
            border: 3px solid rgba(168,85,247,0.6);
        }
        .card-back-b {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #831843, #500724, #1e1b4b);
            border: 3px solid rgba(217,70,239,0.6);
        }
        .card-particles {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.06) 0%, transparent 70%);
        }
        .card-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 6px;
        }
        .card-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(52px, 9vw, 90px);
            line-height: 1;
            text-shadow: 0 0 40px rgba(255,255,255,0.4);
        }
        .card-suit { font-size: 22px; opacity: 0.7; margin-top: 4px; }
        .card-label {
            font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
            letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.25);
            margin-top: 8px;
        }
        @keyframes pulse-border { 0%,100% { border-color: rgba(168,85,247,0.15); } 50% { border-color: rgba(168,85,247,0.5); } }
        .pulse-card { animation: pulse-border 1.5s ease infinite; }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 100%);
            background-size: 200% auto;
            animation: shimmer 2s linear infinite;
        }

        .btn-choose {
            flex-shrink: 0;
            padding: 10px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px; font-weight: 900;
            letter-spacing: 0.15em; text-transform: uppercase;
            border: none; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-choose-a { background: linear-gradient(135deg, #7c3aed, #4c1d95); color: white; box-shadow: 0 6px 20px rgba(124,58,237,0.35); }
        .btn-choose-a:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(124,58,237,0.5); }
        .btn-choose-b { background: linear-gradient(135deg, #c026d3, #86198f); color: white; box-shadow: 0 6px 20px rgba(192,38,211,0.35); }
        .btn-choose-b:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(192,38,211,0.5); }
        .btn-choose:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

        .win-card .card-front,
        .win-card .card-back-a,
        .win-card .card-back-b {
            box-shadow: 0 0 60px rgba(251,191,36,0.5), 0 0 120px rgba(251,191,36,0.2) !important;
            border-color: var(--gold) !important;
        }

        @keyframes confettiFall {
            0%   { transform: translateY(-10px) rotate(0deg); opacity:1; }
            100% { transform: translateY(100px) rotate(540deg); opacity:0; }
        }
        .confetti-p {
            position: absolute; width: 7px; height: 7px; border-radius: 2px;
            animation: confettiFall 0.9s ease forwards; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="app">
    <nav>
        <a href="#" class="nav-back">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            Retour
        </a>
        <span class="nav-title">DOUBLE DUEL</span>
        <div class="balance-badge">
            <span style="color:var(--purple);font-size:16px">💜</span>
            <div>
                <p class="lbl">Solde</p>
                <p class="val" id="balance-display">0 <span style="color:var(--purple);font-size:8px">KMF</span></p>
            </div>
        </div>
    </nav>

    <div class="top-strip">
        <span style="font-family:'Orbitron',sans-serif;font-size:7px;color:#444;text-transform:uppercase;letter-spacing:0.2em;white-space:nowrap">Parties</span>
        <div class="history-dots" id="history-dots"></div>
        <div class="status-box" id="status-msg">Choisissez votre mise puis sélectionnez une carte</div>
    </div>

    <div class="main-grid">
        <!-- PANNEAU GAUCHE -->
        <div class="side-panel">
            <div>
                <p class="lbl-small">Mise (KMF)</p>
                <input type="number" id="mise-input" class="mise-input" value="1000" min="100" max="100000">
            </div>

            <div class="quick-grid">
                <button class="quick-btn" onclick="setMise(500)">500</button>
                <button class="quick-btn" onclick="setMise(1000)">1 000</button>
                <button class="quick-btn" onclick="setMise(2000)">2 000</button>
                <button class="quick-btn" onclick="setMise(5000)">5 000</button>
                <button class="quick-btn full" onclick="setMise(Math.floor(parseInt(document.getElementById('mise-input').value||0)*2))">✕ 2 la mise</button>
                <button class="quick-btn full" onclick="setMise(Math.floor(parseInt(document.getElementById('mise-input').value||0)/2))">÷ 2 la mise</button>
            </div>

            <div class="gain-box">
                <p class="lbl-small" style="opacity:0.7;margin-bottom:2px">Gain potentiel</p>
                <p id="gain-display">2 000 <span style="color:var(--purple);font-size:9px">KMF</span></p>
            </div>

            <div class="rules-mini">
                <div class="rule-item">
                    <div class="emoji">🃏</div>
                    <div class="rtitle">Valeurs</div>
                    <div class="rdesc">As=14<br>Roi=13</div>
                </div>
                <div class="rule-item">
                    <div class="emoji">⚖️</div>
                    <div class="rtitle">Égalité</div>
                    <div class="rdesc">= Victoire</div>
                </div>
                <div class="rule-item">
                    <div class="emoji">💰</div>
                    <div class="rtitle">Gain</div>
                    <div class="rdesc">mise × 2</div>
                </div>
            </div>

            <div class="hint">Carte la + haute gagne<br><span>Égalité = Victoire</span></div>
        </div>

        <!-- ZONE CARTES -->
        <div class="cards-zone">
            <div class="cards-row">
                <!-- Carte A -->
                <div class="card-col">
                    <div class="card-wrapper" id="card-a-wrapper">
                        <div class="card-inner" id="card-a-inner">
                            <div class="card-face card-front pulse-card shimmer">
                                <div class="card-particles"></div>
                                <div class="card-icon" style="background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3)">
                                    <svg width="24" height="24" style="color:var(--purple)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                </div>
                                <span class="card-label">Carte A</span>
                            </div>
                            <div class="card-face card-back-a">
                                <div class="card-particles"></div>
                                <div class="card-number" id="val-a">—</div>
                                <div class="card-suit" id="suit-a">♠</div>
                            </div>
                        </div>
                    </div>
                    <button class="btn-choose btn-choose-a" id="btn-a" onclick="playDuel(1)">⚡ Choisir A</button>
                </div>

                <!-- Carte B -->
                <div class="card-col">
                    <div class="card-wrapper" id="card-b-wrapper">
                        <div class="card-inner" id="card-b-inner">
                            <div class="card-face card-front pulse-card shimmer">
                                <div class="card-particles"></div>
                                <div class="card-icon" style="background:rgba(217,70,239,0.15);border:1px solid rgba(217,70,239,0.3)">
                                    <svg width="24" height="24" style="color:var(--fuchsia)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                </div>
                                <span class="card-label">Carte B</span>
                            </div>
                            <div class="card-face card-back-b">
                                <div class="card-particles"></div>
                                <div class="card-number" id="val-b">—</div>
                                <div class="card-suit" id="suit-b">♥</div>
                            </div>
                        </div>
                    </div>
                    <button class="btn-choose btn-choose-b" id="btn-b" onclick="playDuel(2)">⚡ Choisir B</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUITS = ['♠','♥','♦','♣'];
    const LABELS = {1:'A',11:'J',12:'Q',13:'K',14:'AS'};
    let playing = false;
    let history = [];

    const miseInput   = document.getElementById('mise-input');
    const gainDisplay = document.getElementById('gain-display');
    const statusEl    = document.getElementById('status-msg');
    const btnA        = document.getElementById('btn-a');
    const btnB        = document.getElementById('btn-b');

    miseInput.addEventListener('input', updateGain);
    function updateGain() {
        const v = parseInt(miseInput.value) || 0;
        gainDisplay.innerHTML = (v * 2).toLocaleString('fr') + ' <span style="color:var(--purple);font-size:9px">KMF</span>';
    }
    updateGain();

    function setMise(v) {
        if (isNaN(v) || v < 0) v = 0;
        miseInput.value = v;
        updateGain();
    }

    function setStatus(msg, type = '') {
        statusEl.textContent = msg;
        statusEl.className = 'status-box' + (type === 'win' ? ' win' : type === 'lose' ? ' lose' : '');
    }
    function setButtons(disabled) { btnA.disabled = disabled; btnB.disabled = disabled; }
    function labelVal(v) { return LABELS[v] || String(v); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function playDuel(choice) {
        if (playing) return;
        const mise = parseInt(miseInput.value);
        if (isNaN(mise) || mise < 100 || mise > 100000) { setStatus('⚠️ Mise entre 100 et 100 000 KMF', 'lose'); return; }
        playing = true; setButtons(true); setStatus('⏳ Envoi de la mise...', '');

        try {
            const res = await fetch('', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `action=play&mise=${mise}&choice=${choice}`
            });
            const data = await res.json();

            if (data.error) { setStatus('❌ ' + data.error, 'lose'); playing = false; setButtons(false); return; }

            const suitA = SUITS[Math.floor(Math.random()*4)];
            const suitB = SUITS[Math.floor(Math.random()*4)];
            document.getElementById('val-a').textContent  = labelVal(data.val1);
            document.getElementById('val-b').textContent  = labelVal(data.val2);
            document.getElementById('suit-a').textContent = suitA;
            document.getElementById('suit-b').textContent = suitB;

            setStatus('🃏 Retournement des cartes...', '');
            document.getElementById('card-a-inner').classList.add('flipped');
            await sleep(300);
            document.getElementById('card-b-inner').classList.add('flipped');
            await sleep(600);

            const winCard = data.win
                ? (choice === 1 ? 'card-a-wrapper' : 'card-b-wrapper')
                : (choice === 1 ? 'card-b-wrapper' : 'card-a-wrapper');
            document.getElementById(winCard).classList.add('win-card');

            if (data.win) { setStatus(`🏆 VICTOIRE ! +${data.gain.toLocaleString()} KMF`, 'win'); spawnConfetti(); }
            else { setStatus(`💀 DÉFAITE ! Vous avez perdu votre mise.`, 'lose'); }

            document.getElementById('balance-display').innerHTML =
                data.new_balance + ' <span style="color:var(--purple);font-size:8px">KMF</span>';

            addHistory(data.win ? 'win' : 'lose');
            await sleep(3200);

            document.getElementById('card-a-inner').classList.remove('flipped');
            document.getElementById('card-b-inner').classList.remove('flipped');
            document.getElementById('card-a-wrapper').classList.remove('win-card');
            document.getElementById('card-b-wrapper').classList.remove('win-card');
            setStatus('Choisissez votre mise puis sélectionnez une carte', '');
            playing = false; setButtons(false);
        } catch (e) {
            setStatus('❌ Erreur de connexion au serveur.', 'lose');
            playing = false; setButtons(false);
        }
    }

    function addHistory(type) {
        history.unshift(type);
        if (history.length > 10) history.pop();
        document.getElementById('history-dots').innerHTML = history.map(h =>
            `<div class="history-dot ${h==='win'?'h-win':'h-lose'}">${h==='win'?'W':'L'}</div>`
        ).join('');
    }

    function spawnConfetti() {
        const arena = document.querySelector('.app');
        const colors = ['#a855f7','#d946ef','#fbbf24','#ec4899','#fff'];
        for (let i = 0; i < 24; i++) {
            const el = document.createElement('div');
            el.className = 'confetti-p';
            el.style.cssText = `left:${10+Math.random()*80}%;top:${5+Math.random()*25}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.5}s;animation-duration:${0.7+Math.random()*0.6}s;position:absolute;z-index:999`;
            arena.appendChild(el);
            setTimeout(() => el.remove(), 1300);
        }
    }
</script>
</body>
</html>
