<script>
// ════════════════════════════════════
const planeEl   = document.getElementById('plane');
const multEl    = document.getElementById('mult-display');
const trailPath = document.getElementById('trail-path');

let multiplier = 1.00;
let interval   = null;
let trailPts   = [];
let frameN     = 0;

// 🚀 Lancer le vol automatiquement
startFlight();

function startFlight() {
    multiplier = 1.00;
    planeEl.style.display = 'block';
    planeEl.style.left = '6%';
    planeEl.style.bottom = '12%';

    trailPts = [];
    trailPath.setAttribute('d', '');

    interval = setInterval(() => {
        multiplier += 0.02;

        // afficher multiplicateur
        multEl.textContent = multiplier.toFixed(2) + 'x';

        // déplacer avion
        movePlane(multiplier);

        // crash aléatoire
        if (Math.random() < 0.01) {
            crash();
        }

    }, 50);
}

// ✈️ Mouvement avion
function movePlane(m) {
    frameN++;

    const t  = Math.min((m - 1) / 8, 1);
    const px = 6 + t * 70;
    const py = 12 + Math.pow(t, 1.4) * 60;

    planeEl.style.left   = px + '%';
    planeEl.style.bottom = py + '%';

    // traînée
    if (frameN % 2 === 0) {
        trailPts.push([px, 100 - py]);
        if (trailPts.length > 80) trailPts.shift();

        if (trailPts.length > 2) {
            trailPath.setAttribute(
                'd',
                'M ' + trailPts.map(p => p.join(',')).join(' L ')
            );
        }
    }
}

// 💥 Crash
function crash() {
    clearInterval(interval);

    multEl.textContent = multiplier.toFixed(2) + 'x 💥';
    planeEl.style.display = 'none';

    setTimeout(() => {
        startFlight(); // relancer automatiquement
    }, 3000);
}
</script>
