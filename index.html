<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Pro · Mon Revenu</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow+Condensed:ital,wght@0,400;0,700;1,900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#05080f; --red:#ff2d55; --orange:#ff6b00;
            --gold:#ffcc00; --green:#00e676;
            --dim:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.07);
        }
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

        /* ── LAYOUT FIXE PLEIN ÉCRAN ── */
        html, body {
            width:100%; height:100%;
            overflow:hidden; /* AUCUN scroll */
            background:var(--bg);
            font-family:'Barlow Condensed',sans-serif;
            color:#fff;
        }

        /* Fond */
        .bg-sky { position:fixed;inset:0;z-index:0;pointer-events:none;
            background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(255,45,85,0.08) 0%,transparent 65%),
                       radial-gradient(ellipse 60% 50% at 90% 110%,rgba(255,107,0,0.05) 0%,transparent 60%),
                       linear-gradient(180deg,#05080f 0%,#080d1a 100%); }
        .stars { position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:
                radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,0.4) 0%,transparent 100%),
                radial-gradient(1px 1px at 35% 60%,rgba(255,255,255,0.3) 0%,transparent 100%),
                radial-gradient(1px 1px at 55% 10%,rgba(255,255,255,0.35) 0%,transparent 100%),
                radial-gradient(1px 1px at 75% 45%,rgba(255,255,255,0.25) 0%,transparent 100%),
                radial-gradient(1.5px 1.5px at 25% 80%,rgba(255,255,255,0.3) 0%,transparent 100%); }

        .font-gaming { font-family:'Orbitron',sans-serif; }

        /* ── STRUCTURE PRINCIPALE ── */
        #app {
            position:fixed; inset:0; z-index:1;
            display:flex; flex-direction:column;
        }

        /* NAVBAR */
        #navbar {
            flex-shrink:0;
            background:rgba(5,8,15,0.9);
            backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            padding:6px 12px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .nav-logo { display:flex;align-items:center;gap:6px; }
        .nav-logo svg { width:20px;height:20px;color:#ff2d55; }
        .nav-title { font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;text-transform:uppercase; }
        .balance-badge {
            background:linear-gradient(135deg,rgba(255,45,85,0.12),rgba(255,45,85,0.03));
            border:1px solid rgba(255,45,85,0.3); border-radius:10px;
            padding:5px 10px; display:flex; align-items:center; gap:6px;
        }
        .balance-badge span { font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900; }
        .back-btn {
            display:flex;align-items:center;gap:4px;
            color:rgba(255,255,255,0.4);font-family:'Orbitron',sans-serif;
            font-size:9px;text-transform:uppercase;letter-spacing:.1em;
            text-decoration:none;transition:color .2s;
        }
        .back-btn:hover { color:white; }

        /* HISTORIQUE */
        #hist-row {
            flex-shrink:0;
            padding:4px 12px;
            display:flex; align-items:center; gap:8px;
            background:rgba(5,8,15,0.6);
            border-bottom:1px solid var(--border);
        }
        .hist-label { font-family:'Orbitron',sans-serif;font-size:8px;text-transform:uppercase;color:rgba(255,255,255,0.2);flex-shrink:0; }
        #history-bar { display:flex;gap:6px;overflow-x:auto;flex:1; }
        #history-bar::-webkit-scrollbar { display:none; }
        .hist-badge { font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:100px;border:1px solid var(--border);background:var(--dim);flex-shrink:0; }
        .hist-badge-new { animation:slideLeft .3s ease forwards; }
        @keyframes slideLeft { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }
        .online-info { display:flex;align-items:center;gap:4px;flex-shrink:0; }
        .online-dot { width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
        #online-count { font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3); }

        /* ARENA */
        #arena {
            flex:1; /* Prend tout l'espace restant */
            position:relative; overflow:hidden;
            background:linear-gradient(180deg,#080d1a 0%,#050810 100%);
        }
        .grid-lines {
            position:absolute;inset:0;pointer-events:none;
            background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                             linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
            background-size:50px 50px;
        }
        #trail { position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5; }
        #plane { position:absolute;z-index:10;filter:drop-shadow(0 0 10px rgba(255,45,85,0.8));transition:left .28s linear,bottom .28s linear; }

        #mult-wrap {
            position:absolute;inset:0;z-index:10;pointer-events:none;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
        }
        #mult-display {
            font-family:'Orbitron',sans-serif;font-size:clamp(44px,9vw,90px);
            font-weight:900;line-height:1;transition:color .2s;
        }
        #live-gain { font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;margin-top:6px;transition:color .2s; }

        /* Overlays arena */
        .arena-overlay {
            position:absolute;inset:0;z-index:20;display:none;
            flex-direction:column;align-items:center;justify-content:center;gap:8px;
        }
        .arena-overlay.show { display:flex; }
        #cnt-overlay { background:rgba(5,8,15,0.55);backdrop-filter:blur(3px); }
        #cnt-num { font-family:'Orbitron',sans-serif;font-size:clamp(60px,12vw,110px);font-weight:900;color:var(--gold);text-shadow:0 0 40px rgba(255,204,0,0.6); }
        #crash-cnt-overlay { background:rgba(5,8,15,0.75);backdrop-filter:blur(4px);z-index:22; }
        .crash-big { font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:900;font-size:clamp(32px,7vw,65px);color:var(--red);text-shadow:0 0 30px rgba(255,45,85,0.6); }
        #crash-cnt-num { font-family:'Orbitron',sans-serif;font-size:clamp(44px,9vw,80px);font-weight:900;color:var(--gold); }

        .runway { position:absolute;bottom:0;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,45,85,0.4),rgba(255,107,0,0.4),transparent);border-radius:2px; }

        /* PANNEAU BAS */
        #bet-panel {
            flex-shrink:0;
            background:rgba(5,8,15,0.95);
            border-top:1px solid var(--border);
            padding:8px 10px;
        }

        /* Grille panneau — 3 colonnes sur large, 1 sur mobile */
        #panel-grid {
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            gap:8px;
            align-items:start;
        }
        @media(max-width:600px) {
            #panel-grid { grid-template-columns:1fr 1fr; }
            .col-action { grid-column:1/-1; }
        }

        .panel-label { font-family:'Orbitron',sans-serif;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px; }

        .mise-input {
            width:100%;background:rgba(0,0,0,0.5);border:1px solid var(--border);
            border-radius:10px;color:white;font-family:'Orbitron',sans-serif;
            font-size:15px;font-weight:700;text-align:center;outline:none;
            padding:9px 10px;transition:border-color .3s;
        }
        .mise-input:focus { border-color:rgba(255,45,85,0.5); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }

        .btn-row { display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:3px; }
        .qbtn {
            background:var(--dim);border:1px solid var(--border);border-radius:7px;
            color:rgba(255,255,255,0.45);font-family:'DM Mono',monospace;font-size:10px;
            padding:5px 2px;cursor:pointer;transition:all .2s;text-align:center;
        }
        .qbtn:hover { background:rgba(255,45,85,0.08);border-color:rgba(255,45,85,0.3);color:var(--red); }
        .qbtn-minus:hover { background:rgba(255,107,0,0.08);border-color:rgba(255,107,0,0.3);color:var(--orange); }

        .auto-input {
            width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);
            border-radius:10px;color:white;font-family:'DM Mono',monospace;
            font-size:13px;text-align:center;outline:none;padding:9px 10px;
            transition:border-color .3s;
        }
        .auto-input:focus { border-color:rgba(255,204,0,0.5); }

        .auto-row { display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:3px; }

        .pot-chip {
            background:var(--dim);border:1px solid var(--border);border-radius:8px;
            padding:5px 8px;display:flex;justify-content:space-between;align-items:center;
            margin-top:3px;
        }
        .pot-chip span:first-child { font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,0.3);text-transform:uppercase; }
        .pot-chip span:last-child  { font-family:'DM Mono',monospace;font-size:12px;color:white;font-weight:700; }

        #main-btn {
            width:100%;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;
            letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;
            border-radius:12px;padding:14px 8px;transition:all .3s;
        }
        #main-btn.state-bet { background:linear-gradient(135deg,#ff2d55,#c0152b);color:white;box-shadow:0 6px 20px rgba(255,45,85,0.35); }
        #main-btn.state-bet:hover { transform:translateY(-1px);box-shadow:0 10px 28px rgba(255,45,85,0.5); }
        #main-btn.state-cashout { background:linear-gradient(135deg,#00e676,#00b860);color:#000;animation:cashPulse .8s ease infinite alternate; }
        @keyframes cashPulse { from{box-shadow:0 6px 20px rgba(0,230,118,0.35)} to{box-shadow:0 6px 35px rgba(0,230,118,0.7)} }
        #main-btn.state-wait { background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);cursor:not-allowed; }
        #main-btn:disabled { cursor:not-allowed; }

        #cancel-btn {
            display:none;width:100%;margin-top:5px;padding:9px;border-radius:10px;
            background:rgba(255,45,85,0.08);border:1px solid rgba(255,45,85,0.25);
            color:var(--red);font-family:'Orbitron',sans-serif;font-size:9px;
            font-weight:900;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s;
        }
        #cancel-btn:hover { background:rgba(255,45,85,0.18); }

        /* TOASTS */
        .toast {
            position:fixed;top:70px;right:12px;z-index:300;
            font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
            padding:10px 16px;border-radius:12px;border:1px solid;
            animation:toastIn .35s ease forwards;max-width:240px;
        }
        .toast-win  { background:rgba(0,230,118,0.1);border-color:rgba(0,230,118,0.4);color:var(--green); }
        .toast-lose { background:rgba(255,45,85,0.1);border-color:rgba(255,45,85,0.4);color:var(--red); }
        @keyframes toastIn { from{opacity:0;transform:translateX(24px) scale(0.95)} to{opacity:1;transform:none} }
    </style>
</head>
<body>
<div class="bg-sky"></div>
<div class="stars"></div>

<div id="app">

    <!-- NAVBAR -->
    <div id="navbar">
        <a href="#" class="back-btn">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            Retour
        </a>
        <div class="nav-logo">
            <svg fill="currentColor" viewBox="0 0 24 24" style="color:var(--red)"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.13c-.32.17-.71.17-1.03 0l-7.97-4.13C5.21 17.21 5 16.88 5 16.5V12c0-.38.21-.71.53-.88l7.97-4.13c.32-.17.71-.17 1.03 0l7.97 4.13c.32.17.53.5.53.88v4.5z"/></svg>
            <span class="nav-title font-gaming">AVIATOR <span style="color:var(--red)">PRO</span></span>
        </div>
        <div class="balance-badge">
            <span id="balance-display" style="color:white">50.000</span>
            <span style="color:var(--red);font-size:9px;font-family:'Orbitron',sans-serif">KMF</span>
        </div>
    </div>

    <!-- HISTORIQUE -->
    <div id="hist-row">
        <span class="hist-label">Hist.</span>
        <div id="history-bar">
            <span class="hist-badge" style="color:var(--red)">1.20x</span>
            <span class="hist-badge" style="color:#00e676">5.40x</span>
            <span class="hist-badge" style="color:#ffcc00">2.10x</span>
        </div>
        <div class="online-info">
            <div class="online-dot"></div>
            <span id="online-count">124 joueurs</span>
        </div>
    </div>

    <!-- ARENA -->
    <div id="arena">
        <div class="grid-lines"></div>

        <svg id="trail" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
                <linearGradient id="tg" x1="0" y1="1" x2="1" y2="0">
                    <stop offset="0%" stop-color="rgba(255,45,85,0)"/>
                    <stop offset="100%" stop-color="rgba(255,45,85,0.4)"/>
                </linearGradient>
            </defs>
            <path id="trail-path" d="" fill="none" stroke="url(#tg)" stroke-width="0.6"/>
        </svg>

        <div id="plane" style="bottom:12%;left:6%;display:none;">
            <svg width="50" height="36" viewBox="0 0 60 44" fill="none">
                <ellipse cx="30" cy="22" rx="22" ry="7" fill="#ff2d55"/>
                <path d="M50 22 L58 19 L56 22 L58 25 Z" fill="#ff6b00"/>
                <path d="M28 22 L18 8 L38 16 Z" fill="#c0152b"/>
                <path d="M28 22 L18 36 L38 28 Z" fill="#c0152b"/>
                <path d="M12 22 L8 12 L20 20 Z" fill="#ff2d55"/>
                <ellipse cx="8" cy="22" rx="5" ry="3" fill="rgba(255,107,0,0.5)"/>
                <ellipse cx="4" cy="22" rx="3" ry="2" fill="rgba(255,204,0,0.3)"/>
            </svg>
        </div>

        <div id="mult-wrap">
            <div id="mult-display" style="color:rgba(255,255,255,0.3)">1.00x</div>
            <div id="live-gain" style="color:rgba(255,255,255,0.3)">Prêt pour le décollage</div>
        </div>

        <!-- Overlay countdown waiting -->
        <div class="arena-overlay show" id="cnt-overlay">
            <div id="cnt-num">10</div>
            <div class="font-gaming" style="font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,0.35)">Décollage imminent</div>
        </div>

        <!-- Overlay crashed -->
        <div class="arena-overlay" id="crash-cnt-overlay">
            <div class="crash-big">ENVOLÉ !</div>
            <div id="crash-val2" style="font-family:'DM Mono',monospace;font-size:13px;color:rgba(255,255,255,0.5)">à —</div>
            <div id="crash-cnt-num">10</div>
            <div class="font-gaming" style="font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,204,0,0.5)">Prochaine partie</div>
        </div>

        <div class="runway"></div>
    </div>

    <!-- PANNEAU MISE -->
    <div id="bet-panel">
        <div id="panel-grid">

            <!-- Colonne 1 : Mise -->
            <div>
                <div class="panel-label" style="color:var(--red)">Mise (KMF)</div>
                <input type="number" id="mise-input" class="mise-input" value="1000" min="100" max="100000">
                <div class="btn-row">
                    <button class="qbtn qbtn-minus" onclick="adjustMise(-100)">−100</button>
                    <button class="qbtn qbtn-minus" onclick="adjustMise(-50)">−50</button>
                    <button class="qbtn" onclick="adjustMise(50)">+50</button>
                    <button class="qbtn" onclick="adjustMise(100)">+100</button>
                </div>
                <div class="btn-row" style="margin-top:3px">
                    <button class="qbtn" onclick="setMise(500)">500</button>
                    <button class="qbtn" onclick="setMise(1000)">1K</button>
                    <button class="qbtn" onclick="setMise(5000)">5K</button>
                    <button class="qbtn" onclick="setMise(10000)">10K</button>
                </div>
            </div>

            <!-- Colonne 2 : Auto cashout -->
            <div>
                <div class="panel-label" style="color:var(--gold)">Auto Cashout ×</div>
                <input type="number" id="auto-input" class="auto-input" value="2.00" min="1.10" max="1000" step="0.10">
                <div class="auto-row">
                    <button class="qbtn" onclick="setAuto(1.5)">1.5×</button>
                    <button class="qbtn" onclick="setAuto(2)">2×</button>
                    <button class="qbtn" onclick="setAuto(5)">5×</button>
                    <button class="qbtn" onclick="setAuto(10)">10×</button>
                </div>
                <div class="pot-chip">
                    <span>Gain pot.</span>
                    <span id="pot-gain">2 000 KMF</span>
                </div>
            </div>

            <!-- Colonne 3 : Action -->
            <div class="col-action">
                <div class="panel-label" style="color:rgba(255,255,255,0.3)">Action</div>
                <button id="main-btn" class="state-bet" onclick="handleDemoAction()">🚀 MISER</button>
                <button id="cancel-btn" onclick="cancelBet()">✕ ANNULER LA MISE</button>
            </div>

        </div>
    </div>

</div>

<script>
    /* Simulation Front-end sans PHP/Backend */
    const miseInput = document.getElementById('mise-input');
    const autoInput = document.getElementById('auto-input');
    const mainBtn = document.getElementById('main-btn');
    const potGain = document.getElementById('pot-gain');

    function updatePotGain() {
        const v = parseInt(miseInput.value) || 0;
        const auto = parseFloat(autoInput.value) || 0;
        potGain.textContent = Math.floor(v * auto).toLocaleString('fr') + ' KMF';
    }
    
    miseInput.addEventListener('input', updatePotGain);
    autoInput.addEventListener('input', updatePotGain);

    function setMise(v) { miseInput.value = v; updatePotGain(); }
    function adjustMise(d) { miseInput.value = Math.max(100, (parseInt(miseInput.value)||0) + d); updatePotGain(); }
    function setAuto(v) { autoInput.value = v.toFixed(2); updatePotGain(); }

    function handleDemoAction() {
        if(mainBtn.classList.contains('state-bet')) {
            mainBtn.className = 'state-wait';
            mainBtn.textContent = '✅ MISE POSÉE';
            showToast('Mise enregistrée (Démo)', 'win');
        }
    }

    function showToast(msg, type) {
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
